site_name: Plex2Jellyfin documentation
site_description: Migrate your Plex library to Jellyfin and keep it clean forever.
site_author: Nomadcxx
site_url: https://nomadcxx.github.io/plex2jellyfin
repo_url: https://github.com/Nomadcxx/plex2jellyfin
repo_name: Nomadcxx/plex2jellyfin
edit_uri: edit/main/docs-src/

docs_dir: docs-src
site_dir: site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Docker: getting-started/docker.md
      - Migration Guide: getting-started/migration-guide.md
  - Reference:
      - CLI Reference: reference/cli.md
      - Configuration: reference/configuration.md
      - Daemon & Services: reference/daemon-services.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - tables
  - toc:
      permalink: true
      baselevel: 2
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

extra:
  version:
    plex2jellyfin: dev
