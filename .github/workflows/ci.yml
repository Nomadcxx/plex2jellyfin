name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs-site/**'
      - 'docs/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'docs-site/**'
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Frontend tests
        run: npm test -- --run
        working-directory: web

      - name: Typecheck
        run: npm run typecheck
        working-directory: web

      - name: Production build
        run: npm run build
        working-directory: web

      - name: Embedded frontend gate
        run: |
          rm -rf embedded/frontend
          cp -r web/out embedded/frontend
          make check-frontend

  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Tests
        run: go test ./...
