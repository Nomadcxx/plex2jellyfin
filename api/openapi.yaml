openapi: 3.0.3
info:
  title: Plex2Jellyfin API
  description: API for managing media library cleanup operations
  version: 2.0.0
  license:
    name: GPL-3.0

servers:
  - url: /api/v1
    description: API v1

paths:
  # ============ DASHBOARD ============
  /dashboard:
    get:
      operationId: getDashboard
      summary: Get dashboard aggregate data
      tags: [Dashboard]
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardData'

  # ============ MEDIA MANAGERS ============
  /media-managers:
    get:
      operationId: listMediaManagers
      summary: List all configured media managers
      tags: [Media Managers]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MediaManagerInfo'

  /media-managers/{managerId}/status:
    get:
      operationId: getMediaManagerStatus
      summary: Get service health and stats
      tags: [Media Managers]
      parameters:
        - name: managerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Manager status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatus'

  /media-managers/{managerId}/queue:
    get:
      operationId: getMediaManagerQueue
      summary: Get download queue
      tags: [Media Managers]
      parameters:
        - name: managerId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Queue items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QueueItem'

  /media-managers/{managerId}/queue/{itemId}:
    delete:
      operationId: clearQueueItem
      summary: Clear item from queue
      tags: [Media Managers]
      parameters:
        - name: managerId
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: blocklist
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Item cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'

  /media-managers/{managerId}/stuck:
    get:
      operationId: getStuckItems
      summary: Get stuck queue items
      tags: [Media Managers]
      parameters:
        - name: managerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stuck items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QueueItem'
    delete:
      operationId: clearStuckItems
      summary: Clear all stuck items
      tags: [Media Managers]
      parameters:
        - name: managerId
          in: path
          required: true
          schema:
            type: string
        - name: blocklist
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Items cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'

  /media-managers/{managerId}/scan:
    post:
      operationId: triggerManagerScan
      summary: Trigger import scan
      tags: [Media Managers]
      parameters:
        - name: managerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
      responses:
        '202':
          description: Scan triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'

  # ============ LLM PROVIDERS ============
  /llm-providers:
    get:
      operationId: listLLMProviders
      summary: List configured LLM providers
      tags: [LLM Providers]
      responses:
        '200':
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LLMProviderInfo'

  /llm-providers/{providerId}/status:
    get:
      operationId: getLLMProviderStatus
      summary: Get provider health and model
      tags: [LLM Providers]
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Provider status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMProviderStatus'

  /ai/settings:
    get:
      operationId: getAISettings
      summary: Get current AI settings
      tags: [AI]
      responses:
        '200':
          description: AI settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AISettings'

  # ============ ACTIVITY ============
  /activity:
    get:
      operationId: getActivity
      summary: Get paginated activity log
      tags: [Activity]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Activity events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivityEvent'

  /activity/stream:
    get:
      operationId: activityStream
      summary: SSE stream for real-time activity
      tags: [Activity]
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string

  # ============ DUPLICATES (existing) ============
  /duplicates:
    get:
      operationId: getDuplicates
      summary: Get duplicate analysis
      tags: [Duplicates]
      responses:
        '200':
          description: Duplicate analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateAnalysis'

  /duplicates/{groupId}:
    delete:
      operationId: deleteDuplicate
      summary: Delete inferior file from duplicate group
      tags: [Duplicates]
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: File deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'

  # ============ SCATTERED (existing) ============
  /scattered:
    get:
      operationId: getScattered
      summary: Get scattered media analysis
      tags: [Consolidation]
      responses:
        '200':
          description: Scattered analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScatteredAnalysis'

  /scattered/{itemId}/consolidate:
    post:
      operationId: consolidateItem
      summary: Consolidate scattered media item
      tags: [Consolidation]
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                dryRun:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Consolidation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsolidationResult'

  # ============ SCAN (existing) ============
  /scan:
    post:
      operationId: startScan
      summary: Trigger library scan
      tags: [Scan]
      responses:
        '202':
          description: Scan started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanStatus'

  /scan/status:
    get:
      operationId: getScanStatus
      summary: Get scan status
      tags: [Scan]
      responses:
        '200':
          description: Scan status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanStatus'

  /scan/stream:
    get:
      operationId: scanStream
      summary: SSE stream for scan progress
      tags: [Scan]
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string

  # ============ AUTH ============
  /auth/status:
    get:
      operationId: getAuthStatus
      summary: Check if auth is enabled and current state
      tags: [Auth]
      responses:
        '200':
          description: Auth status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatus'

  /auth/login:
    post:
      operationId: login
      summary: Authenticate with password
      tags: [Auth]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid password

  /auth/logout:
    post:
      operationId: logout
      summary: Clear session cookie
      tags: [Auth]
      responses:
        '200':
          description: Logged out

  /auth/setup:
    post:
      operationId: setupAuth
      summary: First-run setup - create the admin password
      description: Only permitted while no password is configured. Creates the password and logs the caller in.
      tags: [Auth]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password created, session issued
        '400':
          description: Password too short
        '409':
          description: Auth already configured

  /auth/password:
    post:
      operationId: changePassword
      summary: Change the admin password
      description: Requires an authenticated session. Invalidates all other sessions.
      tags: [Auth]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed, fresh session issued
        '400':
          description: New password too short
        '401':
          description: Current password incorrect

  # ============ JELLYFIN VERIFICATION ============
  /jellyfin/verify:
    get:
      operationId: getJellyfinVerification
      summary: Get Jellyfin verification status
      tags: [Jellyfin]
      responses:
        '200':
          description: Verification status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JellyfinVerificationStatus'

  /jellyfin/verify/run:
    post:
      operationId: runJellyfinVerification
      summary: Run Jellyfin verification for a library
      tags: [Jellyfin]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                libraryId:
                  type: string
                libraryPath:
                  type: string
      responses:
        '202':
          description: Verification started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'

  /jellyfin/verify/results:
    get:
      operationId: getJellyfinVerificationResults
      summary: Get verification results
      tags: [Jellyfin]
      parameters:
        - name: libraryId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Verification results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JellyfinVerificationResult'

  /jellyfin/unidentifiable:
    get:
      operationId: getJellyfinUnidentifiableItems
      summary: Get unidentifiable items from Jellyfin
      tags: [Jellyfin]
      parameters:
        - name: libraryId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Unidentifiable items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnidentifiableItem'

  /jellyfin/plugin/status:
    get:
      operationId: getJellyfinPluginStatus
      summary: Get Plex2Jellyfin companion plugin status
      tags: [Jellyfin]
      responses:
        '200':
          description: Plugin status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JellyfinPluginStatus'

  # ============ HEALTH ============
  /health:
    get:
      operationId: healthCheck
      summary: Health check endpoint
      tags: [Health]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string

  # ============ WEBHOOKS ============
  /webhooks/jellyfin:
    post:
      operationId: jellyfinWebhook
      summary: Receive Jellyfin webhook events
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Event accepted
        '400':
          description: Invalid payload
        '401':
          description: Invalid or missing webhook secret

  # ============ SETTINGS ============
  /settings/{section}:
    get:
      operationId: getSettingsSection
      summary: Read a config section
      tags: [Settings]
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
        - name: reveal
          in: query
          required: false
          schema:
            type: integer
            enum: [1]
      responses:
        '200':
          description: Config section
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Unknown section
    put:
      operationId: putSettingsSection
      summary: Replace a config section
      tags: [Settings]
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                type: object

  /settings/paths/{kind}:
    parameters:
      - name: kind
        in: path
        required: true
        schema:
          type: string
          enum: [movies, tv]
    get:
      operationId: getSettingsPaths
      summary: List watch paths
      tags: [Settings]
      responses:
        '200':
          description: Watch paths
    post:
      operationId: addSettingsPath
      summary: Add a watch path
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Added
    put:
      operationId: replaceSettingsPaths
      summary: Replace watch paths
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Replaced

  /settings/paths/{kind}/{index}:
    delete:
      operationId: removeSettingsPath
      summary: Remove a watch path
      tags: [Settings]
      parameters:
        - name: kind
          in: path
          required: true
          schema:
            type: string
            enum: [movies, tv]
        - name: index
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Removed

  /settings/libraries/{kind}:
    parameters:
      - name: kind
        in: path
        required: true
        schema:
          type: string
          enum: [movies, tv]
    get:
      operationId: getSettingsLibraries
      summary: List library paths
      tags: [Settings]
      responses:
        '200':
          description: Library paths
    post:
      operationId: addSettingsLibrary
      summary: Add a library path
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Added
    put:
      operationId: replaceSettingsLibraries
      summary: Replace library paths
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Replaced

  /settings/libraries/{kind}/{index}:
    delete:
      operationId: removeSettingsLibrary
      summary: Remove a library path
      tags: [Settings]
      parameters:
        - name: kind
          in: path
          required: true
          schema:
            type: string
            enum: [movies, tv]
        - name: index
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Removed

  /settings/sonarr/test:
    post:
      operationId: testSonarrConnection
      summary: Test Sonarr connection
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Connection test result

  /settings/radarr/test:
    post:
      operationId: testRadarrConnection
      summary: Test Radarr connection
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Connection test result

  /settings/jellyfin/test:
    post:
      operationId: testJellyfinConnection
      summary: Test Jellyfin connection
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Connection test result

  /paths/preflight:
    post:
      operationId: preflightPath
      summary: Check path access before saving
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Probe result

  # ============ DAEMON LIFECYCLE ============
  /daemon/status:
    get:
      operationId: getDaemonStatus
      summary: Daemon status
      tags: [Daemon]
      responses:
        '200':
          description: Daemon status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaemonStatus'

  /daemon/start:
    post:
      operationId: startDaemon
      summary: Start the daemon process
      tags: [Daemon]
      responses:
        '202':
          description: Start requested
        '500':
          description: Launcher error

  /daemon/stop:
    post:
      operationId: stopDaemon
      summary: Request the daemon to stop
      tags: [Daemon]
      responses:
        '202':
          description: Stop requested
        '502':
          description: IPC error

  /daemon/restart:
    post:
      operationId: restartDaemon
      summary: Stop then start the daemon
      tags: [Daemon]
      responses:
        '202':
          description: Restart requested
        '500':
          description: Launcher error

  /daemon/reload:
    post:
      operationId: reloadDaemon
      summary: Reload daemon configuration
      tags: [Daemon]
      responses:
        '200':
          description: Reload result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReloadResult'
        '502':
          description: IPC error

  /daemon/recover:
    post:
      operationId: recoverDaemon
      summary: Apply recovery action to an interrupted op
      tags: [Daemon]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoverRequest'
      responses:
        '200':
          description: Recovery applied
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '502':
          description: IPC error

  # ============ DATABASE LIFECYCLE ============
  /database/rescan:
    post:
      operationId: rescanDatabase
      summary: Kick off a full library rescan
      tags: [Database]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RescanRequest'
      responses:
        '202':
          description: Op started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpAccepted'

  /database/reset:
    post:
      operationId: resetDatabase
      summary: Reset the media database (typed-confirm gated)
      tags: [Database]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetRequest'
      responses:
        '202':
          description: Op started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpAccepted'
        '400':
          description: Confirmation token missing or wrong

  # ============ OP EVENT STREAM ============
  /events/op/{op_id}:
    get:
      operationId: streamOpEvents
      summary: Server-Sent Events stream of frames for an op
      tags: [Events]
      parameters:
        - name: op_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream of progress / done / error frames
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          description: No such op

components:
  schemas:
    # Dashboard
    DashboardData:
      type: object
      properties:
        libraryStats:
          $ref: '#/components/schemas/LibraryStats'
        mediaManagers:
          type: array
          items:
            $ref: '#/components/schemas/MediaManagerSummary'
        llmProvider:
          $ref: '#/components/schemas/LLMProviderSummary'
        recentActivity:
          type: array
          items:
            $ref: '#/components/schemas/ActivityEvent'

    LibraryStats:
      type: object
      properties:
        totalFiles:
          type: integer
        totalSize:
          type: integer
          format: int64
        movieCount:
          type: integer
        seriesCount:
          type: integer
        episodeCount:
          type: integer
        duplicateGroups:
          type: integer
        reclaimableBytes:
          type: integer
          format: int64
        scatteredSeries:
          type: integer

    # Media Managers
    MediaManagerInfo:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [sonarr, radarr, jellyfin, mediadownloader, custom]
        name:
          type: string
        enabled:
          type: boolean
        capabilities:
          $ref: '#/components/schemas/ManagerCapabilities'

    MediaManagerSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        online:
          type: boolean
        queueSize:
          type: integer
        stuckCount:
          type: integer

    ServiceStatus:
      type: object
      properties:
        online:
          type: boolean
        version:
          type: string
        queueSize:
          type: integer
        stuckCount:
          type: integer
        error:
          type: string

    ManagerCapabilities:
      type: object
      properties:
        supportsRetry:
          type: boolean
        supportsPriority:
          type: boolean
        supportsHistory:
          type: boolean
        supportsQualityEdit:
          type: boolean
        supportsBulkActions:
          type: boolean

    QueueItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        status:
          type: string
        progress:
          type: number
        size:
          type: integer
          format: int64
        sizeRemaining:
          type: integer
          format: int64
        timeLeft:
          type: string
        isStuck:
          type: boolean
        errorMessage:
          type: string
        downloadClient:
          type: string

    # LLM
    LLMProviderInfo:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [ollama, openai, anthropic, lmstudio, custom]
        name:
          type: string
        enabled:
          type: boolean
        currentModel:
          type: string
        capabilities:
          $ref: '#/components/schemas/LLMCapabilities'

    LLMProviderSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        online:
          type: boolean
        currentModel:
          type: string

    LLMProviderStatus:
      type: object
      properties:
        online:
          type: boolean
        model:
          type: string
        modelList:
          type: array
          items:
            $ref: '#/components/schemas/LLMModel'
        error:
          type: string

    LLMModel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        size:
          type: string

    LLMCapabilities:
      type: object
      properties:
        supportsStreaming:
          type: boolean
        supportsVision:
          type: boolean
        supportsModelSwitch:
          type: boolean
        localOnly:
          type: boolean

    AISettings:
      type: object
      properties:
        enabled:
          type: boolean
        defaultProvider:
          type: string
        confidenceThreshold:
          type: number
        autoApply:
          type: boolean

    # Activity
    ActivityEvent:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [FILE_DETECTED, FILE_ORGANIZED, DUPLICATE_FOUND, SYNC_COMPLETED, ERROR]
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    # Duplicates
    DuplicateAnalysis:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/DuplicateGroup'
        totalFiles:
          type: integer
        totalGroups:
          type: integer
        reclaimableBytes:
          type: integer
          format: int64

    DuplicateGroup:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        year:
          type: integer
        mediaType:
          type: string
          enum: [movie, series]
        files:
          type: array
          items:
            $ref: '#/components/schemas/MediaFile'
        bestFileId:
          type: integer
          format: int64
        reclaimableBytes:
          type: integer
          format: int64

    MediaFile:
      type: object
      properties:
        id:
          type: integer
          format: int64
        path:
          type: string
        size:
          type: integer
          format: int64
        resolution:
          type: string
        sourceType:
          type: string
        qualityScore:
          type: integer

    # Scattered
    ScatteredAnalysis:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScatteredItem'
        totalItems:
          type: integer
        totalMoves:
          type: integer
        totalBytes:
          type: integer
          format: int64

    ScatteredItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        year:
          type: integer
        mediaType:
          type: string
        locations:
          type: array
          items:
            type: string
        targetLocation:
          type: string
        filesToMove:
          type: integer
        bytesToMove:
          type: integer
          format: int64

    ConsolidationResult:
      type: object
      properties:
        success:
          type: boolean
        filesMoved:
          type: integer
        bytesMoved:
          type: integer
          format: int64
        errors:
          type: array
          items:
            type: string

    # Scan
    ScanStatus:
      type: object
      properties:
        status:
          type: string
          enum: [idle, scanning, completed, failed]
        progress:
          type: integer
        message:
          type: string

    # Auth
    AuthStatus:
      type: object
      properties:
        enabled:
          type: boolean
        authenticated:
          type: boolean

    # Common
    OperationResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        filesAffected:
          type: integer
        bytesAffected:
          type: integer
          format: int64

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

    # Jellyfin Verification
    JellyfinVerificationStatus:
      type: object
      properties:
        enabled:
          type: boolean
        pluginEnabled:
          type: boolean
        connected:
          type: boolean
        lastVerification:
          type: string
          format: date-time
        librariesVerified:
          type: integer
        totalMismatches:
          type: integer

    JellyfinVerificationResult:
      type: object
      properties:
        libraryPath:
          type: string
        scannedCount:
          type: integer
        identifiedCount:
          type: integer
        unidentifiedCount:
          type: integer
        mismatches:
          type: array
          items:
            $ref: '#/components/schemas/JellyfinMismatch'
        lastRun:
          type: string
          format: date-time

    JellyfinMismatch:
      type: object
      properties:
        path:
          type: string
        issue:
          type: string
          enum: [orphaned, missing, unidentified]
        itemName:
          type: string
        itemId:
          type: string

    UnidentifiableItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
        type:
          type: string
        dateAdded:
          type: string
          format: date-time

    JellyfinPluginStatus:
      type: object
      properties:
        installed:
          type: boolean
        version:
          type: string
        healthy:
          type: boolean
        libraries:
          type: integer
        message:
          type: string

    # Daemon / database lifecycle
    DaemonStatus:
      type: object
      properties:
        state:
          type: string
          description: One of running, stopped, starting, stopping, degraded
        pid:
          type: integer
        uptime_seconds:
          type: integer
        version:
          type: string
      additionalProperties: true

    ReloadResult:
      type: object
      properties:
        ok:
          type: boolean
        reloaded:
          type: array
          items:
            type: string
        failed:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              error:
                type: string

    RecoverRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          description: Recovery action (e.g. discard)

    RescanRequest:
      type: object
      properties:
        paths:
          type: array
          items:
            type: string
        dry_run:
          type: boolean

    ResetRequest:
      type: object
      required: [confirm]
      properties:
        confirm:
          type: string
          description: Must equal "media.db" to authorize the reset
        preserve:
          type: array
          items:
            type: string

    OpAccepted:
      type: object
      required: [op_id]
      properties:
        op_id:
          type: string
