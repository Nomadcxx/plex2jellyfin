<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dupGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dupGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#dupGrad1)"/>
  
  <!-- Decorative elements -->
  <circle cx="80" cy="80" r="60" fill="#10b981" fill-opacity="0.05"/>
  <circle cx="420" cy="420" r="100" fill="#34d399" fill-opacity="0.03"/>
  
  <!-- Main illustration: No duplicates / Clean state -->
  <g transform="translate(256, 200)">
    <!-- Checkmark circle -->
    <circle cx="0" cy="0" r="80" fill="#065f46" stroke="#10b981" stroke-width="3"/>
    <circle cx="0" cy="0" r="70" fill="url(#dupGrad2)" fill-opacity="0.3"/>
    
    <!-- Checkmark -->
    <path d="M-30,-5 L-10,15 L35,-30" stroke="#10b981" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Sparkles -->
    <g fill="#34d399">
      <path d="M-100,-40 L-95,-40 L-97.5,-45 Z" />
      <path d="M80,-60 L85,-60 L82.5,-65 Z" />
      <path d="M60,50 L65,50 L62.5,55 Z" />
      <path d="M-70,60 L-65,60 L-67.5,65 Z" />
    </g>
    
    <!-- File icons in background -->
    <g opacity="0.2">
      <rect x="-120" y="20" width="30" height="40" rx="3" fill="#10b981"/>
      <rect x="90" y="-30" width="25" height="35" rx="3" fill="#34d399"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="256" y="380" text-anchor="middle" fill="#6ee7b7" font-family="system-ui, sans-serif" font-size="24" font-weight="600">
    Library Optimized
  </text>
  <text x="256" y="410" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="16">
    No duplicate files found
  </text>
</svg>