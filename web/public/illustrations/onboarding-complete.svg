<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="completeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="completeGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0.2" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#completeGrad1)"/>
  
  <!-- Decorative elements -->
  <circle cx="120" cy="120" r="80" fill="#10b981" fill-opacity="0.08"/>
  <circle cx="400" cy="400" r="100" fill="#34d399" fill-opacity="0.05"/>
  
  <!-- Main illustration: Celebration -->
  <g transform="translate(256, 200)">
    <!-- Trophy/Award -->
    <g transform="translate(0, -20)">
      <!-- Trophy cup -->
      <path d="M-30,0 L-30,40 Q-30,60 0,60 Q30,60 30,40 L30,0 Z" fill="#059669" stroke="#10b981" stroke-width="3"/>
      <rect x="-5" y="60" width="10" height="20" fill="#047857" stroke="#10b981" stroke-width="2"/>
      <rect x="-20" y="80" width="40" height="8" rx="4" fill="#059669" stroke="#10b981" stroke-width="2"/>
      
      <!-- Handles -->
      <path d="M-30,10 Q-50,10 -50,25 Q-50,40 -30,40" stroke="#10b981" stroke-width="3" fill="none"/>
      <path d="M30,10 Q50,10 50,25 Q50,40 30,40" stroke="#10b981" stroke-width="3" fill="none"/>
      
      <!-- Star on trophy -->
      <path d="M0,20 L4,32 L16,32 L6,40 L10,52 L0,44 L-10,52 L-6,40 L-16,32 L-4,32 Z" fill="#fbbf24" filter="url(#glow)"/>
    </g>
    
    <!-- Confetti/celebration particles -->
    <g fill="#34d399">
      <circle cx="-80" cy="-60" r="4" opacity="0.8"/>
      <circle cx="70" cy="-70" r="3" opacity="0.6"/>
      <circle cx="-60" cy="50" r="5" opacity="0.7"/>
      <circle cx="80" cy="40" r="4" opacity="0.5"/>
      <rect x="-90" y="20" width="6" height="6" rx="1" transform="rotate(45 -90 20)" opacity="0.6"/>
      <rect x="60" y="-40" width="5" height="5" rx="1" transform="rotate(30 60 -40)" opacity="0.8"/>
    </g>
    
    <!-- Sparkles -->
    <g stroke="#fbbf24" stroke-width="2" stroke-linecap="round">
      <path d="M-100,-30 L-95,-30 M-97.5,-35 L-97.5,-25" opacity="0.8"/>
      <path d="M90,-50 L95,-50 M92.5,-55 M92.5,-45" opacity="0.6"/>
      <path d="M-70,60 L-65,60 M-67.5,55 L-67.5,65" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="256" y="360" text-anchor="middle" fill="#6ee7b7" font-family="system-ui, sans-serif" font-size="32" font-weight="700">
    All Done!
  </text>
  <text x="256" y="400" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="18">
    Your library is now perfectly organized
  </text>
</svg>