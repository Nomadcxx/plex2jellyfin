<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4c51bf;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4c51bf;stop-opacity:0" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#grad1)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#4c51bf" fill-opacity="0.05"/>
  <circle cx="400" cy="400" r="120" fill="#6366f1" fill-opacity="0.03"/>
  
  <!-- Main illustration: Media library concept -->
  <g transform="translate(256, 220)">
    <!-- Server/Storage box -->
    <rect x="-80" y="-40" width="160" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="-70" y="-30" width="140" height="8" rx="4" fill="#3b82f6" fill-opacity="0.3"/>
    <rect x="-70" y="-15" width="140" height="8" rx="4" fill="#3b82f6" fill-opacity="0.2"/>
    <rect x="-70" y="0" width="140" height="8" rx="4" fill="#3b82f6" fill-opacity="0.1"/>
    
    <!-- Status lights -->
    <circle cx="-60" cy="20" r="4" fill="#10b981"/>
    <circle cx="-45" cy="20" r="4" fill="#3b82f6"/>
    <circle cx="-30" cy="20" r="4" fill="#6366f1"/>
    
    <!-- Film strip -->
    <rect x="-40" y="-80" width="80" height="60" rx="4" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="-35" y="-75" width="70" height="50" rx="2" fill="#0f172a"/>
    <rect x="-32" y="-72" width="8" height="8" fill="#334155"/>
    <rect x="-32" y="-58" width="8" height="8" fill="#334155"/>
    <rect x="-32" y="-44" width="8" height="8" fill="#334155"/>
    <rect x="24" y="-72" width="8" height="8" fill="#334155"/>
    <rect x="24" y="-58" width="8" height="8" fill="#334155"/>
    <rect x="24" y="-44" width="8" height="8" fill="#334155"/>
    <!-- Play icon in film -->
    <path d="M-5,-55 L15,-45 L-5,-35 Z" fill="#6366f1" fill-opacity="0.6"/>
    
    <!-- Floating elements -->
    <circle cx="60" cy="-60" r="20" fill="#6366f1" fill-opacity="0.1" filter="url(#glow)"/>
    <path d="M55,-65 L65,-55 M65,-65 L55,-55" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
    
    <circle cx="-70" cy="60" r="15" fill="#3b82f6" fill-opacity="0.1"/>
    <rect x="-78" y="55" width="16" height="10" rx="2" fill="#3b82f6" fill-opacity="0.3"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="400" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="18" font-weight="500">
    Ready to organize your media
  </text>
</svg>