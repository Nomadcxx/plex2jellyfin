<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="consOnGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#075985;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="consOnGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#consOnGrad1)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="70" fill="#0ea5e9" fill-opacity="0.05"/>
  <circle cx="400" cy="400" r="90" fill="#38bdf8" fill-opacity="0.03"/>
  
  <!-- Main illustration: Scattered files consolidating -->
  <g transform="translate(256, 200)">
    <!-- Scattered folders (source) -->
    <g opacity="0.5">
      <g transform="translate(-100, -40)">
        <path d="M0,0 L0,25 L30,25 L30,5 L20,5 L15,0 Z" fill="#0369a1" stroke="#0ea5e9" stroke-width="1"/>
      </g>
      <g transform="translate(-80, 20)">
        <path d="M0,0 L0,25 L30,25 L30,5 L20,5 L15,0 Z" fill="#0369a1" stroke="#0ea5e9" stroke-width="1"/>
      </g>
      <g transform="translate(60, -30)">
        <path d="M0,0 L0,25 L30,25 L30,5 L20,5 L15,0 Z" fill="#0369a1" stroke="#0ea5e9" stroke-width="1"/>
      </g>
    </g>
    
    <!-- Arrows pointing to center -->
    <path d="M-70,-20 L-30,0" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowhead)"/>
    <path d="M-50,30 L-30,10" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <path d="M50,-15 L30,0" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Main organized folder (destination) -->
    <g transform="translate(-40, -30)">
      <path d="M0,0 L0,60 L80,60 L80,10 L50,10 L40,0 Z" fill="#0284c7" stroke="#38bdf8" stroke-width="3"/>
      <rect x="5" y="15" width="70" height="40" rx="4" fill="url(#consOnGrad2)"/>
      
      <!-- Organized items inside -->
      <rect x="10" y="20" width="20" height="12" rx="2" fill="#0ea5e9" opacity="0.6"/>
      <rect x="35" y="20" width="20" height="12" rx="2" fill="#0ea5e9" opacity="0.4"/>
      <rect x="10" y="36" width="20" height="12" rx="2" fill="#0ea5e9" opacity="0.5"/>
      <rect x="35" y="36" width="20" height="12" rx="2" fill="#0ea5e9" opacity="0.3"/>
    </g>
    
    <!-- Success indicator -->
    <g transform="translate(50, -50)">
      <circle cx="0" cy="0" r="20" fill="#10b981" fill-opacity="0.2" stroke="#34d399" stroke-width="2"/>
      <path d="M-6,0 L-2,4 L6,-4" stroke="#34d399" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="256" y="380" text-anchor="middle" fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="24" font-weight="600">
    Consolidate Series
  </text>
  <text x="256" y="410" text-anchor="middle" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="16">
    Bring scattered episodes back together
  </text>
</svg>