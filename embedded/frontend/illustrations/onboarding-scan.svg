<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="scanGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scanGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#scanGrad1)"/>
  
  <!-- Scanning grid effect -->
  <g opacity="0.1">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#3b82f6" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#3b82f6" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#3b82f6" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#3b82f6" stroke-width="1"/>
  </g>
  
  <!-- Main illustration: Scanner analyzing files -->
  <g transform="translate(256, 220)">
    <!-- Scanner beam -->
    <rect x="-100" y="-60" width="200" height="4" fill="#3b82f6" filter="url(#glow)"/>
    <rect x="-100" y="-56" width="200" height="40" fill="url(#scanGrad2)"/>
    
    <!-- Files being scanned -->
    <g transform="translate(-60, 20)">
      <rect x="0" y="0" width="40" height="50" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
      <rect x="5" y="8" width="30" height="4" rx="2" fill="#3b82f6" opacity="0.5"/>
      <rect x="5" y="16" width="20" height="4" rx="2" fill="#60a5fa" opacity="0.3"/>
      <circle cx="20" cy="35" r="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
      <path d="M16,35 L20,39 L26,31" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <g transform="translate(-10, 10)">
      <rect x="0" y="0" width="40" height="50" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
      <rect x="5" y="8" width="30" height="4" rx="2" fill="#3b82f6" opacity="0.5"/>
      <rect x="5" y="16" width="25" height="4" rx="2" fill="#60a5fa" opacity="0.3"/>
      <circle cx="20" cy="35" r="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
      <path d="M16,35 L20,39 L26,31" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </g>
    
    <g transform="translate(40, 25)">
      <rect x="0" y="0" width="40" height="50" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
      <rect x="5" y="8" width="30" height="4" rx="2" fill="#3b82f6" opacity="0.5"/>
      <rect x="5" y="16" width="15" height="4" rx="2" fill="#60a5fa" opacity="0.3"/>
      <circle cx="20" cy="35" r="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
    </g>
    
    <!-- Scanning progress indicators -->
    <rect x="-80" y="-40" width="40" height="3" rx="1.5" fill="#1e293b"/>
    <rect x="-80" y="-40" width="32" height="3" rx="1.5" fill="#3b82f6"/>
    
    <text x="0" y="100" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="14">
      Scanning your library...
    </text>
  </g>
  
  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="28" font-weight="600">
    Library Scan
  </text>
</svg>